name: Update Plugin Zip

on:
  push:

jobs:
  update-plugin-zip:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Build plugin zip
        run: |
          if [ -f "admin/create_plugin_zip.py" ]; then
            python admin/create_plugin_zip.py
          else
            echo "Skipping: admin/create_plugin_zip.py not found on this branch"
            exit 0
          fi
        
      - name: Commit and push if changed
        run: |
          if [ ! -f "admin/create_plugin_zip.py" ]; then
            echo "Script not present, skipping commit check"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/team-analyst-plugin.zip
          if git diff --staged --quiet; then
            echo "No changes to plugin zip"
          else
            git commit -m "chore: update plugin zip [skip ci]"
            git push
            echo "Plugin zip updated and pushed"
          fi
